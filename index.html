<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; --gray: #1a1a1a; --green: #00ff88; }
        
        html, body { height: 100%; margin: 0; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; height: 100vh; position: relative; }

        #video-container { width: 100%; aspect-ratio: 16 / 9; max-height: 35vh; background: #000; flex-shrink: 0; border-bottom: 1px solid #333; }
        #player { width: 100%; height: 100%; }

        /* 検索バー構成: 🔑 -> Mode -> Input -> GO */
        .search-bar { padding: 10px 15px; background: var(--black); flex-shrink: 0; border-bottom: 1px solid #222; display: flex; gap: 8px; align-items: center; }
        
        /* 🔑 Activation */
        #key-trigger { cursor: pointer; font-size: 1.1rem; transition: 0.3s; filter: grayscale(1); opacity: 0.4; flex-shrink: 0; }
        #key-trigger.active { filter: grayscale(0); opacity: 1; text-shadow: 0 0 10px var(--green); }

        /* Movie / Music Toggle */
        .mode-selector { display: flex; background: var(--gray); border-radius: 4px; padding: 2px; flex-shrink: 0; border: 1px solid #333; }
        .mode-btn { 
            font-size: 0.6rem; padding: 6px 8px; border-radius: 2px; cursor: pointer; color: #666; font-weight: bold; transition: 0.2s;
        }
        .mode-btn.active { background: #333; color: var(--pink); }

        /* Input Field */
        .input-wrapper { flex-grow: 1; position: relative; }
        #search-input { 
            background: var(--gray); border: 1px solid #333; border-radius: 4px;
            font-size: 1rem; color: white; width: 100%; padding: 10px; outline: none; box-sizing: border-box;
        }
        
        /* GO Button */
        #search-btn {
            background: transparent; color: var(--pink); border: 1px solid var(--pink);
            padding: 0 15px; border-radius: 4px; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; height: 40px; line-height: 40px; flex-shrink: 0;
        }

        /* Status & Back */
        #meta-info { position: absolute; left: 15px; top: 100%; display: flex; gap: 10px; margin-top: 5px; }
        #status { font-size: 0.55rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        #back-btn { display: none; color: var(--pink); font-size: 0.6rem; font-weight: bold; cursor: pointer; }

        #lst { flex-grow: 1; overflow-y: auto; padding: 15px 15px 50px 15px; -webkit-overflow-scrolling: touch; }

        /* Setup Overlay */
        #setup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; justify-content: center; align-items: center;
        }
        .z-panel {
            width: 85%; max-width: 360px; padding: 40px 20px; border: 1px solid var(--pink);
            background: var(--black); text-align: center;
        }
        .z-btn {
            background: transparent; color: var(--pink); border: 1px solid var(--pink);
            padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 0.75rem; margin-bottom: 20px;
        }
        .setup-input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333;
            color: var(--green); font-family: monospace; text-align: center; outline: none; box-sizing: border-box;
        }

        /* List UI */
        .section-label { font-size: 0.65rem; color: var(--pink); font-weight: bold; margin: 15px 0 10px; border-left: 2px solid var(--pink); padding-left: 8px; letter-spacing: 2px; }
        .row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; cursor: pointer; }
        .type-tag { width: 40px; font-size: 0.5rem; padding: 2px 0; background: #222; color: #888; border-radius: 2px; flex-shrink: 0; text-align: center; margin-right: 10px; }
        .thumb-box { width: 45px; height: 45px; flex-shrink: 0; margin-right: 12px; border-radius: 2px; overflow: hidden; background: #1a1a1a; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .title { flex-grow: 1; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ddd; }
        .duration { font-size: 0.7rem; color: #555; font-family: monospace; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="video-container"><div id="player"></div></div>
        
        <div class="search-bar">
            <div id="key-trigger" onclick="toggleSetup()">🔑</div>
            
            <div class="mode-selector">
                <div id="mode-mov" class="mode-btn" onclick="setMode('movie')">MOV</div>
                <div id="mode-msc" class="mode-btn active" onclick="setMode('music')">MSC</div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="search-input" placeholder="READY" onkeydown="if(event.key==='Enter') doSearch()">
                <div id="meta-info">
                    <div id="status">CORE READY</div>
                    <div id="back-btn" onclick="restoreLastSearch()">← BACK</div>
                </div>
            </div>

            <button id="search-btn" onclick="doSearch()">GO</button>
        </div>

        <div id="lst"></div>
    </div>

    <div id="setup-overlay">
        <div class="z-panel">
            <div style="color:var(--pink); font-size:0.8rem; letter-spacing:4px; margin-bottom:20px;">ZEFRAM CORE</div>
            <button class="z-btn" onclick="openGoogle()">OPEN TERMINAL</button>
            <input type="text" id="api-key-input" class="setup-input" placeholder="PASTE CORE KEY" oninput="checkKey()">
            <div id="setup-status" style="font-size:0.6rem; margin-top:15px; color:#555;"></div>
            <div style="margin-top:30px; font-size:0.6rem; color:#444; cursor:pointer;" onclick="toggleSetup()">[ CLOSE ]</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let API_KEY = localStorage.getItem('ZEFRAM_API_KEY');
        let currentMode = 'music'; // デフォルトはMusic
        let player, lastResultsHTML = "";

        window.addEventListener('DOMContentLoaded', updateKeyStatus);

        function setMode(m) {
            currentMode = m;
            document.getElementById('mode-mov').classList.toggle('active', m === 'movie');
            document.getElementById('mode-msc').classList.toggle('active', m === 'music');
        }

        function updateKeyStatus() {
            const trigger = document.getElementById('key-trigger');
            const status = document.getElementById('status');
            if (API_KEY) {
                trigger.classList.add('active');
                status.innerText = "CORE ACTIVE";
            } else {
                trigger.classList.remove('active');
                status.innerHTML = "<span style='color:var(--pink)'>OFFLINE</span>";
            }
        }

        function toggleSetup() {
            const el = document.getElementById('setup-overlay');
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function openGoogle() {
            window.open('https://console.cloud.google.com/apis/credentials', 'z_terminal', 'width=700,height=800');
        }

        async function checkKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if (val.length < 30) return;
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/videoCategories?part=snippet&regionCode=JP&key=${val}`);
                if (res.ok) {
                    localStorage.setItem('ZEFRAM_API_KEY', val);
                    API_KEY = val;
                    updateKeyStatus();
                    setTimeout(toggleSetup, 800);
                }
            } catch (e) {}
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1 }
            });
        }

        async function doSearch() {
            if (!API_KEY) return toggleSetup();
            const q = document.getElementById('search-input').value;
            if (!q) return;

            document.getElementById('status').innerText = "SEARCHING...";
            document.getElementById('back-btn').style.display = "none";

            // モードに応じたクエリの調整
            const suffix = (currentMode === 'music') ? " Topic" : " Official MV";
            
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + suffix)}&maxResults=50&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                
                const videoIds = data.items.filter(i => i.id.kind === 'youtube#video').map(i => i.id.videoId).join(',');
                let durationMap = {};
                if (videoIds) {
                    const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`);
                    const dData = await dRes.json();
                    dData.items.forEach(i => { durationMap[i.id] = parseDuration(i.contentDetails.duration); });
                }

                renderList(data.items, durationMap);
                lastResultsHTML = document.getElementById('lst').innerHTML;
                document.getElementById('status').innerText = "DONE";
            } catch (e) { document.getElementById('status').innerText = "ERROR"; }
        }

        function renderList(items, durationMap) {
            const lst = document.getElementById('lst');
            let html = "";
            const playlists = items.filter(i => i.id.kind === 'youtube#playlist');
            if (playlists.length > 0) {
                html += '<div class="section-label">ALBUMS</div>';
                html += playlists.map(i => `<div class="row" onclick="loadAlbum('${i.id.playlistId}', '${i.snippet.title}')">
                    <span class="type-tag">ALBUM</span>
                    <div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div>
                    <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                    <div class="duration">--:--</div>
                </div>`).join('');
            }
            const videos = items.filter(i => i.id.kind === 'youtube#video');
            if (videos.length > 0) {
                html += '<div class="section-label">VIDEOS</div>';
                html += videos.map(i => `<div class="row" onclick="playVideo('${i.id.videoId}')">
                    <span class="type-tag">SONG</span>
                    <div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div>
                    <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                    <div class="duration">${durationMap[i.id.videoId] || "--:--"}</div>
                </div>`).join('');
            }
            lst.innerHTML = html;
            lst.scrollTop = 0;
        }

        async function loadAlbum(playlistId, title) {
            document.getElementById('status').innerText = "LOADING ALBUM...";
            try {
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                const videoIds = data.items.map(i => i.snippet.resourceId.videoId).join(',');
                const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`);
                const dData = await dRes.json();
                let durationMap = {};
                dData.items.forEach(i => { durationMap[i.id] = parseDuration(i.contentDetails.duration); });
                
                let html = `<div class="section-label">${title.replace(/ - Topic$/, "")}</div>`;
                html += data.items.map(i => `<div class="row" onclick="playVideo('${i.snippet.resourceId.videoId}')">
                    <span class="type-tag">SONG</span>
                    <div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div>
                    <div class="title">${i.snippet.title}</div>
                    <div class="duration">${durationMap[i.snippet.resourceId.videoId] || "--:--"}</div>
                </div>`).join('');
                document.getElementById('lst').innerHTML = html;
                document.getElementById('back-btn').style.display = "block";
                document.getElementById('status').innerText = "DONE";
            } catch (e) { }
        }

        function parseDuration(pt) {
            const m = pt.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!m) return "--:--";
            const h = m[1] ? parseInt(m[1]) : 0, min = m[2] ? parseInt(m[2]) : 0, sec = m[3] ? parseInt(m[3]) : 0;
            const res = [];
            if (h > 0) res.push(h);
            res.push(h > 0 ? min.toString().padStart(2, '0') : min);
            res.push(sec.toString().padStart(2, '0'));
            return res.join(':');
        }

        function restoreLastSearch() {
            document.getElementById('lst').innerHTML = lastResultsHTML;
            document.getElementById('back-btn').style.display = "none";
        }

        function playVideo(id) {
            if (player && player.loadVideoById) {
                player.loadVideoById({ videoId: id });
                document.getElementById('search-input').blur();
            }
        }
    </script>
</body>
</html>
