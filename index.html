<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST</title>
    <style>
        :root { --pink: #ff007f; --black: #050505; --gray: #1a1a1a; --green: #00ff88; }
        
        html, body { height: 100%; margin: 0; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }
        .main-container { display: flex; flex-direction: column; height: 100vh; position: relative; }

        #video-container { width: 100%; aspect-ratio: 16 / 9; max-height: 35vh; background: #000; flex-shrink: 0; border-bottom: 1px solid #333; }
        #player { width: 100%; height: 100%; }

        /* 検索バー周り */
        .search-bar { padding: 10px 15px; background: var(--black); flex-shrink: 0; border-bottom: 1px solid #222; display: flex; gap: 10px; align-items: flex-start; }
        
        /* 🔑マークと入力グループ */
        .input-group { flex-grow: 1; display: flex; align-items: center; gap: 8px; }
        #key-trigger { 
            cursor: pointer; font-size: 1.2rem; transition: 0.3s; filter: grayscale(1); opacity: 0.5;
        }
        #key-trigger.active { filter: grayscale(0); opacity: 1; text-shadow: 0 0 10px var(--green); }

        #search-input { 
            background: var(--gray); border: 1px solid #333; border-radius: 4px;
            font-size: 1.1rem; color: white; width: 100%; padding: 10px; outline: none; box-sizing: border-box;
        }
        
        #search-btn {
            background: transparent; color: var(--pink); border: 1px solid var(--pink);
            padding: 10px 15px; border-radius: 4px; font-size: 0.9rem; font-weight: bold;
            cursor: pointer; white-space: nowrap; height: 44px;
        }

        #status { font-size: 0.6rem; color: #666; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #back-btn { display: none; color: var(--pink); font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-top: 5px; }

        #lst { flex-grow: 1; overflow-y: auto; padding: 0 15px 50px 15px; -webkit-overflow-scrolling: touch; }

        /* セットアップ用モーダル（get-apiの移植） */
        #setup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; justify-content: center; align-items: center;
        }
        .z-panel {
            width: 90%; max-width: 400px; padding: 40px 20px; border: 1px solid var(--pink);
            background: var(--black); text-align: center; box-shadow: 0 0 30px rgba(255, 0, 127, 0.2);
        }
        .z-btn {
            background: transparent; color: var(--pink); border: 1px solid var(--pink);
            padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 0.8rem; margin-bottom: 20px;
        }
        .setup-input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333;
            color: var(--green); font-family: monospace; text-align: center; outline: none; box-sizing: border-box;
        }
        .close-btn { color: #666; font-size: 0.7rem; margin-top: 20px; cursor: pointer; text-decoration: underline; }

        /* リスト項目など */
        .section-label { font-size: 0.7rem; color: var(--pink); font-weight: bold; margin: 20px 0 10px; border-left: 3px solid var(--pink); padding-left: 8px; letter-spacing: 2px; }
        .row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; cursor: pointer; }
        .type-tag { width: 45px; font-size: 0.55rem; padding: 2px 0; background: #333; color: #aaa; border-radius: 2px; flex-shrink: 0; text-align: center; margin-right: 10px; }
        .thumb-box { width: 50px; height: 50px; flex-shrink: 0; margin-right: 12px; overflow: hidden; border-radius: 2px; background: #222; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .title { flex-grow: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 10px; color: #eee; }
        .duration { font-size: 0.75rem; color: #666; flex-shrink: 0; font-family: monospace; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="video-container"><div id="player"></div></div>
        
        <div class="search-bar">
            <div id="key-trigger" onclick="toggleSetup()">🔑</div>
            <div class="input-group">
                <div style="width: 100%;">
                    <input type="text" id="search-input" placeholder="SEARCH..." onkeydown="if(event.key==='Enter') doSearch()">
                    <div id="status">AWAITING CORE...</div>
                    <div id="back-btn" onclick="restoreLastSearch()">← BACK</div>
                </div>
            </div>
            <button id="search-btn" onclick="doSearch()">選 曲</button>
        </div>

        <div id="lst"></div>
    </div>

    <div id="setup-overlay">
        <div class="z-panel">
            <div style="font-size: 1.2rem; color: var(--pink); letter-spacing: 4px; margin-bottom: 5px;">ZEFRAM</div>
            <div style="font-size: 0.6rem; color: #666; margin-bottom: 30px;">CORE SETUP</div>
            
            <button class="z-btn" onclick="openGoogle()">OPEN GOOGLE TERMINAL</button>
            <input type="text" id="api-key-input" class="setup-input" placeholder="PASTE CORE KEY" oninput="checkKey()">
            <div id="setup-status" style="font-size: 0.6rem; margin-top: 10px; height: 1rem;"></div>
            
            <div class="close-btn" onclick="toggleSetup()">CLOSE TERMINAL</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let API_KEY = localStorage.getItem('ZEFRAM_API_KEY');
        let player, lastResultsHTML = "";

        // 初期状態の反映
        window.addEventListener('DOMContentLoaded', () => {
            updateKeyStatus();
        });

        function updateKeyStatus() {
            const trigger = document.getElementById('key-trigger');
            const status = document.getElementById('status');
            if (API_KEY) {
                trigger.classList.add('active');
                status.innerText = "CORE ACTIVE";
            } else {
                trigger.classList.remove('active');
                status.innerHTML = "<span style='color:var(--pink)'>🔑 KEY REQUIRED</span>";
            }
        }

        function toggleSetup() {
            const overlay = document.getElementById('setup-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        function openGoogle() {
            const w = 700; const h = 800;
            const left = (window.screen.width / 2) - (w / 2);
            const top = (window.screen.height / 2) - (h / 2);
            window.open('https://console.cloud.google.com/apis/credentials', 'z_terminal', 
                `width=${w},height=${h},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no`);
        }

        async function checkKey() {
            const val = document.getElementById('api-key-input').value.trim();
            const sStatus = document.getElementById('setup-status');
            if (val.length < 30) return;

            try {
                const url = `https://www.googleapis.com/youtube/v3/videoCategories?part=snippet&regionCode=JP&key=${val}`;
                const res = await fetch(url);
                if (res.ok) {
                    localStorage.setItem('ZEFRAM_API_KEY', val);
                    API_KEY = val;
                    sStatus.innerHTML = "<span style='color:var(--green)'>CORE ACTIVATED</span>";
                    updateKeyStatus();
                    setTimeout(toggleSetup, 1000); // 1秒後に自動で閉じる
                } else {
                    sStatus.innerHTML = "<span style='color:var(--pink)'>INVALID KEY</span>";
                }
            } catch (e) { sStatus.innerText = "CONN ERROR"; }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 1, 'rel': 0, 'origin': location.origin, 'modestbranding': 1 }
            });
        }

        async function doSearch() {
            if (!API_KEY) {
                toggleSetup();
                return;
            }
            const q = document.getElementById('search-input').value;
            if (!q) return;
            document.getElementById('status').innerText = "SEARCHING...";
            document.getElementById('back-btn').style.display = "none";

            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + " Topic")}&maxResults=50&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                const videoIds = data.items.filter(i => i.id.kind === 'youtube#video').map(i => i.id.videoId).join(',');
                let durationMap = {};
                if (videoIds) {
                    const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`);
                    const dData = await dRes.json();
                    dData.items.forEach(i => { durationMap[i.id] = parseDuration(i.contentDetails.duration); });
                }

                renderList(data.items, durationMap);
                lastResultsHTML = document.getElementById('lst').innerHTML;
                document.getElementById('lst').scrollTop = 0;
                document.getElementById('status').innerText = "DONE";
            } catch (e) { document.getElementById('status').innerText = "ERROR: " + e.message; }
        }

        // --- 描画・ユーティリティ ---
        function renderList(items, durationMap) {
            const lst = document.getElementById('lst');
            let html = "";
            const playlists = items.filter(i => i.id.kind === 'youtube#playlist');
            if (playlists.length > 0) {
                html += '<div class="section-label">ALBUMS</div>';
                html += playlists.map(i => {
                    const thumb = i.snippet.thumbnails.medium ? i.snippet.thumbnails.medium.url : i.snippet.thumbnails.default.url;
                    return `<div class="row" onclick="loadAlbum('${i.id.playlistId}', '${i.snippet.title}')">
                        <span class="type-tag">ALBUM</span>
                        <div class="thumb-box"><img src="${thumb}"></div>
                        <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                        <div class="duration">--:--</div>
                    </div>`;
                }).join('');
            }
            const videos = items.filter(i => i.id.kind === 'youtube#video');
            if (videos.length > 0) {
                html += '<div class="section-label">SONGS</div>';
                html += videos.map(i => {
                    const thumb = i.snippet.thumbnails.medium ? i.snippet.thumbnails.medium.url : i.snippet.thumbnails.default.url;
                    const dur = durationMap[i.id.videoId] || "--:--";
                    return `<div class="row" onclick="playVideo('${i.id.videoId}')">
                        <span class="type-tag">SONG</span>
                        <div class="thumb-box"><img src="${thumb}"></div>
                        <div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div>
                        <div class="duration">${dur}</div>
                    </div>`;
                }).join('');
            }
            lst.innerHTML = html;
        }

        async function loadAlbum(playlistId, title) {
            document.getElementById('status').innerText = "OPENING ALBUM...";
            try {
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                const videoIds = data.items.map(i => i.snippet.resourceId.videoId).join(',');
                const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`);
                const dData = await dRes.json();
                let durationMap = {};
                dData.items.forEach(i => { durationMap[i.id] = parseDuration(i.contentDetails.duration); });
                let html = `<div class="section-label">${title.replace(/ - Topic$/, "")}</div>`;
                html += data.items.map(i => {
                    const thumb = i.snippet.thumbnails.medium ? i.snippet.thumbnails.medium.url : i.snippet.thumbnails.default.url;
                    const dur = durationMap[i.snippet.resourceId.videoId] || "--:--";
                    return `<div class="row" onclick="playVideo('${i.snippet.resourceId.videoId}')">
                        <span class="type-tag">SONG</span>
                        <div class="thumb-box"><img src="${thumb}"></div>
                        <div class="title">${i.snippet.title}</div>
                        <div class="duration">${dur}</div>
                    </div>`;
                }).join('');
                document.getElementById('lst').innerHTML = html;
                document.getElementById('back-btn').style.display = "block";
                document.getElementById('lst').scrollTop = 0;
                document.getElementById('status').innerText = "DONE";
            } catch (e) { document.getElementById('status').innerText = "ERROR."; }
        }

        function parseDuration(pt) {
            const m = pt.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!m) return "--:--";
            const h = m[1] ? parseInt(m[1]) : 0;
            const min = m[2] ? parseInt(m[2]) : 0;
            const sec = m[3] ? parseInt(m[3]) : 0;
            const result = [];
            if (h > 0) result.push(h);
            result.push(h > 0 ? min.toString().padStart(2, '0') : min);
            result.push(sec.toString().padStart(2, '0'));
            return result.join(':');
        }

        function restoreLastSearch() {
            document.getElementById('lst').innerHTML = lastResultsHTML;
            document.getElementById('back-btn').style.display = "none";
            document.getElementById('lst').scrollTop = 0;
        }

        function playVideo(id) {
            if (player && player.loadVideoById) {
                player.loadVideoById({ videoId: id, suggestedQuality: 'highres' });
                document.getElementById('search-input').blur();
            }
        }
    </script>
</body>
</html>
